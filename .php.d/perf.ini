; Belimbing local performance tuning (added by Claude Code).
; Loaded via PHP_INI_SCAN_DIR, which start-app.ps1 points at this directory.
; These override the FrankenPHP php.ini defaults without needing admin rights.
; To disable, delete this file (or the PHP_INI_SCAN_DIR line in start-app.ps1).

[opcache]
opcache.enable=1

; The codebase has ~11k PHP files; the default cap (10000) silently evicts and
; recompiles files on every request. Raise it so everything stays compiled.
opcache.max_accelerated_files=20000

opcache.memory_consumption=256
opcache.interned_strings_buffer=32

; Tracing JIT speeds CPU-bound Blade rendering and bootstrap (was disabled).
opcache.jit=tracing
opcache.jit_buffer_size=128M

; Kept dev-friendly: edited PHP is still picked up (revalidated every 2s).
; For an extra boost when you are NOT editing PHP, set validate_timestamps=0
; here and restart the app after any code change.
opcache.validate_timestamps=1
opcache.revalidate_freq=2
