  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Instrument Serif';\n  font-style: italic;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"405cfc82-d7d9-432e-94ec-88f068be4870\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Instrument Serif';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"e3e407bd-2e76-4577-854f-cc43728004c8\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Instrument Serif';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"dae5a47f-fb6c-449f-9aec-6b80e619b306\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n\n<style>\n  :root {\n    /* Warmer, calmer cream — Hey/Basecamp territory */\n    --cream:       #f5efe4;\n    --cream-lift:  #fbf6ec;\n    --cream-deep:  #ebe2d2;\n    --paper:       #ffffff;\n    --ink:         #1f1a14;\n    --ink-soft:    #3d362c;\n    --muted:       #76695a;\n    --line:        #d9cfbe;\n    --line-soft:   #e5ddcd;\n\n    /* One bold accent. Used sparingly. */\n    --accent:      #c14d2b;\n    --accent-deep: #a23f20;\n    --accent-tint: #f5ddcf;\n\n    /* Status — desaturated, ink-led */\n    --good:        #4a6b3a;\n    --good-tint:   #e8ecdc;\n    --warn:        #a06a1b;\n    --warn-tint:   #f3e4c6;\n    --bad:         #9a3026;\n    --bad-tint:    #f0d7d2;\n\n    /* Shift families — quiet, name-led */\n    --sh-early:   #efe7d0;\n    --sh-early-i: #6c5418;\n    --sh-day:     #e9e3d4;\n    --sh-day-i:   #3d362c;\n    --sh-eve:     #dfd6e2;\n    --sh-eve-i:   #4a3f55;\n    --sh-night:   #2c2f3a;\n    --sh-night-i: #f5efe4;\n    --sh-leave:   #efd9c7;\n    --sh-leave-i: #8a4a1f;\n  }\n  * { box-sizing: border-box; margin: 0; padding: 0; }\n  html, body {\n    font-family: 'Instrument Sans', ui-sans-serif, system-ui, sans-serif;\n    color: var(--ink);\n    background: var(--cream);\n    -webkit-font-smoothing: antialiased;\n    text-rendering: optimizeLegibility;\n  }\n  body { font-size: 15px; line-height: 1.5; }\n  .serif { font-family: 'Instrument Serif', Georgia, serif; font-weight: 400; }\n\n  /* ─── Review page chrome ──────────────────────────────────────── */\n  .review-page { max-width: 1840px; margin: 0 auto; padding: 56px 56px 96px; }\n\n  .kicker { font-size: 12px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }\n  .review-title { font-size: 56px; font-weight: 400; letter-spacing: -0.025em; color: var(--ink); margin-bottom: 18px; line-height: 1.02; }\n  .review-title em { font-style: italic; }\n  .review-lede { font-size: 18px; color: var(--ink-soft); max-width: 820px; line-height: 1.55; }\n  .review-lede strong { font-weight: 600; color: var(--ink); }\n  .review-meta { display: flex; gap: 32px; margin-top: 28px; flex-wrap: wrap; font-size: 13px; color: var(--muted); }\n  .review-meta strong { color: var(--ink); font-weight: 500; }\n\n  hr.divider { border: none; border-top: 1px solid var(--line); margin: 56px 0 40px; }\n\n  /* ─── DHH principles strip ──────────────────────────────────── */\n  .principles { display: grid; grid-template-columns: repeat(6, 1fr); gap: 0; border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); margin: 36px 0 0; }\n  .principle { padding: 18px 22px 20px; border-right: 1px solid var(--line); }\n  .principle:last-child { border-right: none; }\n  .principle-n { font-family: 'Instrument Serif', serif; font-size: 28px; color: var(--accent); line-height: 1; margin-bottom: 6px; font-style: italic; }\n  .principle-h { font-size: 13px; font-weight: 600; color: var(--ink); margin-bottom: 4px; letter-spacing: -0.005em; }\n  .principle-b { font-size: 12.5px; color: var(--muted); line-height: 1.45; }\n\n  /* ─── Split ──────────────────────────────────────────────────── */\n  .split { display: grid; grid-template-columns: minmax(0, 1fr) 340px; gap: 40px; align-items: start; }\n  .notes-rail { position: sticky; top: 24px; display: flex; flex-direction: column; gap: 28px; }\n\n  /* ─── Notes (no card chrome — DHH style) ─────────────────────── */\n  .note-block h3 { font-family: 'Instrument Serif', serif; font-size: 26px; font-weight: 400; color: var(--ink); margin-bottom: 12px; letter-spacing: -0.01em; line-height: 1.15; }\n  .note-block h3 em { font-style: italic; color: var(--accent); }\n  .note-list { list-style: none; display: flex; flex-direction: column; gap: 14px; }\n  .note-list li { font-size: 14.5px; line-height: 1.55; color: var(--ink-soft); padding-left: 0; }\n  .note-list li b { color: var(--ink); font-weight: 600; }\n  .note-list li code { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 13px; background: var(--cream-deep); padding: 1px 6px; border-radius: 4px; color: var(--ink); }\n  .note-list li::before { content: \"—\"; color: var(--accent); font-weight: 600; margin-right: 8px; }\n\n  .pull-quote { border-left: 3px solid var(--accent); padding: 4px 0 4px 16px; margin: 4px 0 8px; font-family: 'Instrument Serif', serif; font-size: 20px; font-style: italic; color: var(--ink); line-height: 1.3; }\n\n  /* ─── Mockup frame ───────────────────────────────────────────── */\n  .mockup-wrap { display: flex; flex-direction: column; gap: 16px; }\n  .mockup-label { display: flex; align-items: baseline; gap: 12px; font-size: 12px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }\n  .mockup-label em { font-family: 'Instrument Serif', serif; font-size: 16px; font-style: italic; color: var(--accent); text-transform: none; letter-spacing: 0; font-weight: 400; }\n  .mockup-frame { background: var(--cream); border: 1px solid var(--line); border-radius: 4px; overflow: hidden; box-shadow: 0 8px 32px -10px rgba(31, 26, 20, 0.18); position: relative; }\n\n  /* ─── App shell — flat, no panels ────────────────────────────── */\n  .app { display: grid; grid-template-columns: 220px 1fr; min-height: 1280px; background: var(--cream); }\n\n  /* ─── Sidebar — Basecamp-flat ───────────────────────────────── */\n  .sb { padding: 22px 18px 14px; display: flex; flex-direction: column; gap: 4px; border-right: 1px solid var(--line); }\n  .sb-brand { display: flex; align-items: center; gap: 9px; margin-bottom: 18px; padding: 0 6px; }\n  .sb-brand-mark { width: 22px; height: 22px; }\n  .sb-brand-name { font-family: 'Instrument Serif', serif; font-size: 22px; color: var(--ink); letter-spacing: -0.01em; line-height: 1; }\n  .sb-brand-name em { font-style: italic; color: var(--accent); }\n\n  .sb-sect { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); padding: 18px 8px 6px; }\n  .sb-link { padding: 4px 8px; font-size: 14.5px; color: var(--ink-soft); cursor: pointer; border-radius: 4px; line-height: 1.5; }\n  .sb-link:hover { color: var(--accent); }\n  .sb-link.active { color: var(--accent); font-weight: 600; }\n  .sb-link.parent { color: var(--ink); }\n  .sb-children { padding-left: 14px; display: flex; flex-direction: column; gap: 1px; border-left: 1px solid var(--line-soft); margin-left: 8px; margin-top: 2px; margin-bottom: 4px; }\n  .sb-children .sb-link { font-size: 14px; padding: 3px 10px; }\n  .sb-children .sb-link .n { font-size: 12px; color: var(--muted); margin-left: 6px; font-variant-numeric: tabular-nums; }\n\n  .sb-foot { margin-top: auto; padding: 16px 8px 0; border-top: 1px solid var(--line-soft); font-size: 13px; color: var(--muted); display: flex; align-items: center; gap: 10px; }\n  .sb-foot .ava { width: 26px; height: 26px; border-radius: 99px; background: var(--accent); color: white; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; }\n\n  /* ─── Main — no topbar chrome, just a hairline ─────────────── */\n  .main { padding: 0; display: flex; flex-direction: column; min-width: 0; }\n\n  /* Slim navigation strip — back link + minimal */\n  .top { padding: 18px 32px 12px; display: flex; align-items: center; justify-content: space-between; }\n  .back-link { font-size: 13.5px; color: var(--muted); display: inline-flex; align-items: center; gap: 6px; cursor: pointer; }\n  .back-link:hover { color: var(--ink); }\n  .back-link::before { content: \"← \"; }\n  .top-right { font-size: 13px; color: var(--muted); display: flex; align-items: center; gap: 20px; }\n  .top-right .co { display: inline-flex; align-items: center; gap: 6px; cursor: pointer; }\n  .top-right .co::before { content: ''; width: 7px; height: 7px; border-radius: 99px; background: var(--warn); display: inline-block; }\n  .top-right .co:hover { color: var(--ink); }\n\n  /* ─── Page title — big serif moment ─────────────────────────── */\n  .page-head { padding: 12px 32px 0; }\n  .page-title { font-family: 'Instrument Serif', serif; font-size: 64px; font-weight: 400; line-height: 1; letter-spacing: -0.02em; color: var(--ink); }\n  .page-title em { font-style: italic; }\n  .page-title .period { color: var(--accent); }\n  .page-sub { margin-top: 10px; font-size: 17px; color: var(--muted); }\n  .page-sub strong { color: var(--ink); font-weight: 500; }\n\n  /* ─── The summary — a sentence, not a stat strip ────────────── */\n  .summary { padding: 28px 32px 12px; margin-top: 18px; border-top: 1px solid var(--line); }\n  .summary-row { display: flex; align-items: flex-start; gap: 28px; }\n  .summary-num { font-family: 'Instrument Serif', serif; font-size: 72px; line-height: 0.9; color: var(--accent); font-style: italic; flex-shrink: 0; padding-top: 4px; }\n  .summary-text { flex: 1; min-width: 0; }\n  .summary-h { font-family: 'Instrument Serif', serif; font-size: 30px; font-weight: 400; color: var(--ink); line-height: 1.15; letter-spacing: -0.01em; margin-bottom: 8px; }\n  .summary-h em { font-style: italic; }\n  .summary-b { font-size: 16px; color: var(--ink-soft); line-height: 1.55; max-width: 720px; }\n  .summary-b u { text-decoration: underline; text-decoration-color: var(--accent); text-decoration-thickness: 1.5px; text-underline-offset: 3px; cursor: pointer; }\n  .summary-actions { margin-top: 14px; display: flex; gap: 18px; align-items: center; }\n  .summary-cta { font-size: 15px; font-weight: 600; color: var(--accent); cursor: pointer; }\n  .summary-cta::after { content: \" →\"; }\n  .summary-cta:hover { color: var(--accent-deep); }\n  .summary-aux { font-size: 14px; color: var(--muted); cursor: pointer; }\n  .summary-aux:hover { color: var(--ink); }\n\n  /* ─── Controls — conversational filter line ────────────────── */\n  .controls { padding: 32px 32px 14px; display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }\n  .filter-prose { font-size: 15px; color: var(--ink-soft); line-height: 1.5; }\n  .filter-prose .pick { color: var(--ink); font-weight: 600; cursor: pointer; border-bottom: 1px dashed var(--line); padding-bottom: 1px; }\n  .filter-prose .pick:hover { color: var(--accent); border-bottom-color: var(--accent); }\n  .week-nav { display: inline-flex; align-items: center; gap: 22px; font-size: 14.5px; color: var(--muted); }\n  .week-nav .here { color: var(--ink); font-weight: 600; }\n  .week-nav a { cursor: pointer; color: var(--muted); }\n  .week-nav a:hover { color: var(--ink); }\n\n  /* ─── The grid — flat, no cells, just rows ─────────────────── */\n  .grid-wrap { padding: 18px 32px 24px; }\n  .grid {\n    display: grid;\n    grid-template-columns: 220px repeat(7, minmax(100px, 1fr));\n    font-size: 14px;\n    border-top: 1px solid var(--ink);\n  }\n  .gh, .gc, .gname { padding: 14px 14px 16px; border-bottom: 1px solid var(--line); min-height: 76px; display: flex; align-items: center; }\n  .gh { background: transparent; padding: 12px 14px 10px; min-height: 0; border-bottom: 1px solid var(--ink); display: block; }\n  .gh .d-name { font-size: 12px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 2px; }\n  .gh .d-num { font-family: 'Instrument Serif', serif; font-size: 22px; line-height: 1; color: var(--ink); }\n  .gh .d-cov { font-size: 11.5px; color: var(--muted); margin-top: 4px; font-variant-numeric: tabular-nums; }\n  .gh.today .d-num { color: var(--accent); font-style: italic; }\n  .gh.today .d-name { color: var(--accent); }\n  .gh.weekend .d-num { color: var(--muted); }\n  .gh.gap .d-cov { color: var(--bad); font-weight: 600; }\n\n  .gname { gap: 12px; padding-left: 0; }\n  .gname .info { line-height: 1.3; min-width: 0; }\n  .gname .n { font-size: 16px; font-weight: 600; color: var(--ink); letter-spacing: -0.005em; }\n  .gname .r { font-size: 12.5px; color: var(--muted); margin-top: 1px; }\n  .gname .r .h { color: var(--ink-soft); font-variant-numeric: tabular-nums; }\n  .gname .ava { width: 32px; height: 32px; border-radius: 99px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; }\n\n  .gc { padding: 10px 8px; cursor: pointer; transition: background 0.12s; flex-direction: column; align-items: stretch; }\n  .gc:hover { background: var(--cream-lift); }\n  .gc.weekend { background: rgba(0,0,0,0.015); }\n  .gc.empty { color: var(--muted); justify-content: center; align-items: center; }\n  .gc.empty::after { content: '·'; color: var(--line); font-size: 22px; }\n  .gc.empty:hover::after { content: '+ add'; font-size: 12px; color: var(--accent); font-weight: 600; }\n\n  .pill { padding: 6px 10px 7px; line-height: 1.2; font-size: 13px; display: flex; flex-direction: column; gap: 1px; position: relative; }\n  .pill .code { font-size: 13.5px; font-weight: 700; letter-spacing: 0.01em; color: var(--ink); }\n  .pill .time { font-size: 11.5px; color: var(--muted); font-variant-numeric: tabular-nums; }\n  .pill .pol { font-size: 10.5px; color: var(--muted); margin-top: 1px; opacity: 0.8; }\n  .pill.early { background: var(--sh-early); }\n  .pill.early .code { color: var(--sh-early-i); }\n  .pill.day { background: var(--sh-day); }\n  .pill.day .code { color: var(--sh-day-i); }\n  .pill.eve { background: var(--sh-eve); }\n  .pill.eve .code { color: var(--sh-eve-i); }\n  .pill.night { background: var(--sh-night); }\n  .pill.night .code, .pill.night .time, .pill.night .pol { color: var(--sh-night-i); }\n  .pill.night .time, .pill.night .pol { opacity: 0.7; }\n  .pill.leave { background: var(--sh-leave); }\n  .pill.leave .code { color: var(--sh-leave-i); }\n  .pill.off { background: transparent; }\n  .pill.off .code { color: var(--muted); font-weight: 500; }\n\n  .pill .flag { position: absolute; top: 4px; right: 6px; font-size: 10px; color: var(--bad); font-weight: 700; }\n  .pill.night .flag { color: var(--bad-tint); }\n\n  .gname.add { color: var(--muted); cursor: pointer; }\n  .gname.add .ava { background: transparent; border: 1.5px dashed var(--line); color: var(--muted); }\n  .gname.add .n { color: var(--muted); font-weight: 500; font-style: italic; font-family: 'Instrument Serif', serif; font-size: 17px; }\n  .gname.add:hover .n { color: var(--accent); }\n\n  /* ─── Bottom action band — conversational, one CTA ─────────── */\n  .band { margin: 32px 32px 36px; padding: 22px 26px; background: var(--ink); color: var(--cream); border-radius: 4px; display: flex; align-items: center; gap: 24px; }\n  .band-text { flex: 1; }\n  .band-h { font-family: 'Instrument Serif', serif; font-size: 22px; line-height: 1.2; }\n  .band-h em { font-style: italic; }\n  .band-h .acc { color: #f4b591; }\n  .band-sub { font-size: 13px; color: rgba(245,239,228,0.6); margin-top: 3px; }\n  .band-actions { display: flex; gap: 14px; align-items: center; }\n  .btn-quiet { font-size: 14px; color: var(--cream); opacity: 0.7; cursor: pointer; }\n  .btn-quiet:hover { opacity: 1; }\n  .btn-send { background: var(--accent); color: white; padding: 12px 22px; border-radius: 4px; font-size: 15px; font-weight: 600; font-family: inherit; border: none; cursor: pointer; letter-spacing: -0.005em; }\n  .btn-send:hover { background: var(--accent-deep); }\n\n  /* ─── Pins ──────────────────────────────────────────────────── */\n  .pin { position: absolute; width: 24px; height: 24px; border-radius: 99px; background: var(--accent); color: white; font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(193,77,43,0.45), 0 0 0 5px rgba(193,77,43,0.15); z-index: 8; font-variant-numeric: tabular-nums; font-family: 'Instrument Serif', serif; font-style: italic; }\n\n  @media (max-width: 1500px) {\n    .split { grid-template-columns: 1fr; }\n    .notes-rail { position: static; }\n    .principles { grid-template-columns: 1fr 1fr 1fr; }\n    .principle:nth-child(3n) { border-right: none; }\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n<div class=\"review-page\">\n\n  <!-- ─── Header ─────────────────────────────────────────────── -->\n  <header>\n    <div class=\"kicker\">Roster Builder · iteration ②<\u002Fdiv>\n    <h1 class=\"review-title serif\">What would <em>David<\u002Fem> do?<\u002Fh1>\n    <p class=\"review-lede\">\n      Last pass treated the roster as a serious enterprise grid — five-up stat strip, segmented controls, an issues panel, breadcrumbs, the works. <strong>DHH would cut three quarters of that.<\u002Fstrong> A roster has one job: tell the team who's working next week. Most weeks, the answer is \"the same as last week, with two changes\". A great roster tool ships that as the default, in plain language, with one button to send.\n    <\u002Fp>\n\n    <!-- ─── DHH principles applied ───────────────────────────── -->\n    <div class=\"principles\">\n      <div class=\"principle\">\n        <div class=\"principle-n\">1<\u002Fdiv>\n        <div class=\"principle-h\">Speak like a human<\u002Fdiv>\n        <div class=\"principle-b\">Replace stat strips with sentences. \"Five things to sort out\" beats \"Conflicts: 3 / Gaps: 2\".<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"principle\">\n        <div class=\"principle-n\">2<\u002Fdiv>\n        <div class=\"principle-h\">One bold action<\u002Fdiv>\n        <div class=\"principle-b\">Not Preview + Export + Validate + Publish. Just <em>Send to the team<\u002Fem>. The rest hides until asked.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"principle\">\n        <div class=\"principle-n\">3<\u002Fdiv>\n        <div class=\"principle-h\">Opinionated defaults<\u002Fdiv>\n        <div class=\"principle-b\">\"Same as last week\" is the path of least resistance, not an option buried in a menu.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"principle\">\n        <div class=\"principle-n\">4<\u002Fdiv>\n        <div class=\"principle-h\">No cards<\u002Fdiv>\n        <div class=\"principle-b\">Sections separated by air and a hairline rule. Cards-in-cards-in-cards is anxiety.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"principle\">\n        <div class=\"principle-n\">5<\u002Fdiv>\n        <div class=\"principle-h\">Typography is the design<\u002Fdiv>\n        <div class=\"principle-b\">Serif headlines for moments. Sans for the work. Generous sizes. Type does the hierarchy.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"principle\">\n        <div class=\"principle-n\">6<\u002Fdiv>\n        <div class=\"principle-h\">Personality, sparingly<\u002Fdiv>\n        <div class=\"principle-b\">A single italic period. An accent-coloured underline. Not a parade of emoji and decoration.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"review-meta\">\n      <span><strong>Surface<\u002Fstrong> People · Attendance · Rosters<\u002Fspan>\n      <span><strong>Reviewer<\u002Fstrong> Design · DHH lens<\u002Fspan>\n      <span><strong>Date<\u002Fstrong> 17 May 2026<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <hr class=\"divider\">\n\n  <!-- ─── Split: mockup + notes ─────────────────────────────── -->\n  <div class=\"split\">\n\n    <div class=\"mockup-wrap\">\n      <div class=\"mockup-label\">\n        <span>Iteration ② — DHH lens<\u002Fspan>\n        <em>\"What's the one thing this page needs to say?\"<\u002Fem>\n      <\u002Fdiv>\n\n      <div class=\"mockup-frame\">\n        <div class=\"app\">\n\n          <!-- ─── Sidebar ──────────────────────────────────────── -->\n          <aside class=\"sb\">\n            <div class=\"sb-brand\">\n              <svg class=\"sb-brand-mark\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M12 2 L14.5 9.5 L22 12 L14.5 14.5 L12 22 L9.5 14.5 L2 12 L9.5 9.5 Z\" fill=\"#78ac35\"><\u002Fpath><circle cx=\"12\" cy=\"12\" r=\"2.5\" fill=\"#fdd105\"><\u002Fcircle><\u002Fsvg>\n              <span class=\"sb-brand-name\">Belimbing<em>.<\u002Fem><\u002Fspan>\n            <\u002Fdiv>\n\n            <div class=\"sb-sect\">Today<\u002Fdiv>\n            <div class=\"sb-link\">Inbox <span style=\"margin-left:6px;color:var(--muted);font-size:12px;\">3<\u002Fspan><\u002Fdiv>\n            <div class=\"sb-link\">Approvals <span style=\"margin-left:6px;color:var(--muted);font-size:12px;\">4<\u002Fspan><\u002Fdiv>\n\n            <div class=\"sb-sect\">Work<\u002Fdiv>\n            <div class=\"sb-link parent\">Administration<\u002Fdiv>\n            <div class=\"sb-link parent\">People<\u002Fdiv>\n            <div class=\"sb-children\">\n              <div class=\"sb-link parent\">Attendance<\u002Fdiv>\n              <div class=\"sb-children\">\n                <div class=\"sb-link\">Policy Studio<\u002Fdiv>\n                <div class=\"sb-link parent\" style=\"color:var(--ink);\">Rosters<\u002Fdiv>\n                <div class=\"sb-children\">\n                  <div class=\"sb-link\">This week<\u002Fdiv>\n                  <div class=\"sb-link active\">Next week<\u002Fdiv>\n                  <div class=\"sb-link\">Templates <span class=\"n\">6<\u002Fspan><\u002Fdiv>\n                  <div class=\"sb-link\">Shifts<\u002Fdiv>\n                  <div class=\"sb-link\">Published<\u002Fdiv>\n                <\u002Fdiv>\n                <div class=\"sb-link\">Timesheets<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"sb-link parent\">Commerce<\u002Fdiv>\n            <div class=\"sb-link parent\">Operations<\u002Fdiv>\n\n            <div class=\"sb-foot\">\n              <div class=\"ava\">KN<\u002Fdiv>\n              <span>Kiat<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Faside>\n\n          <!-- ─── Main ─────────────────────────────────────────── -->\n          <div class=\"main\">\n\n            <!-- Slim top — back link only, no breadcrumb soup -->\n            <div class=\"top\">\n              <span class=\"back-link\">All rosters<\u002Fspan>\n              <div class=\"top-right\">\n                <span class=\"co\">Company — not set yet<\u002Fspan>\n                <span>Help<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <!-- ─── Big serif title ─────────────────────────── -->\n            <div class=\"page-head\">\n              <h1 class=\"page-title\">The <em>Operations<\u002Fem> roster<span class=\"period\">.<\u002Fspan><\u002Fh1>\n              <div class=\"page-sub\">Week of <strong>Monday 18<\u002Fstrong> — <strong>Sunday 24 May<\u002Fstrong>. Draft. Goes out Friday.<\u002Fdiv>\n            <\u002Fdiv>\n\n            <!-- ─── The summary — a sentence ────────────────── -->\n            <div class=\"summary\">\n              <div class=\"summary-row\">\n                <div class=\"summary-num\">5<\u002Fdiv>\n                <div class=\"summary-text\">\n                  <div class=\"summary-h\">things to sort out before <em>Friday<\u002Fem>.<\u002Fdiv>\n                  <div class=\"summary-b\">\n                    <u>Sunday's empty<\u002Fu> — two operators short. <u>Ben Tan is doing back-to-back nights<\u002Fu>, which breaks the rest rule. <u>Monday and Tuesday are one operator short<\u002Fu>. Priya is on approved leave, so she's not the problem. Fix those four and we ship.\n                  <\u002Fdiv>\n                  <div class=\"summary-actions\">\n                    <span class=\"summary-cta\">Sort out Sunday first<\u002Fspan>\n                    <span class=\"summary-aux\">Or copy last week's roster and adjust →<\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <!-- ─── Controls — prose, not chips ──────────────── -->\n            <div class=\"controls\">\n              <div class=\"filter-prose\">\n                Showing <span class=\"pick\">7 of 24 operators<\u002Fspan> in <span class=\"pick\">Site&nbsp;A<\u002Fspan>, all roles.\n              <\u002Fdiv>\n              <div class=\"week-nav\">\n                <a>← Last week<\u002Fa>\n                <span class=\"here\">Week 21<\u002Fspan>\n                <a>Next week →<\u002Fa>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <!-- ─── The grid ─────────────────────────────────── -->\n            <div class=\"grid-wrap\">\n              <div class=\"grid\">\n\n                <!-- Headers -->\n                <div class=\"gh\">&nbsp;<\u002Fdiv>\n                <div class=\"gh\"><div class=\"d-name\">Mon<\u002Fdiv><div class=\"d-num\">18<\u002Fdiv><div class=\"d-cov\">5 of 6<\u002Fdiv><\u002Fdiv>\n                <div class=\"gh\"><div class=\"d-name\">Tue<\u002Fdiv><div class=\"d-num\">19<\u002Fdiv><div class=\"d-cov\">5 of 6<\u002Fdiv><\u002Fdiv>\n                <div class=\"gh today\"><div class=\"d-name\">Wed · today<\u002Fdiv><div class=\"d-num\">20<\u002Fdiv><div class=\"d-cov\">all in<\u002Fdiv><\u002Fdiv>\n                <div class=\"gh\"><div class=\"d-name\">Thu<\u002Fdiv><div class=\"d-num\">21<\u002Fdiv><div class=\"d-cov\">all in<\u002Fdiv><\u002Fdiv>\n                <div class=\"gh\"><div class=\"d-name\">Fri<\u002Fdiv><div class=\"d-num\">22<\u002Fdiv><div class=\"d-cov\">all in<\u002Fdiv><\u002Fdiv>\n                <div class=\"gh weekend\"><div class=\"d-name\">Sat<\u002Fdiv><div class=\"d-num\">23<\u002Fdiv><div class=\"d-cov\">3 of 3<\u002Fdiv><\u002Fdiv>\n                <div class=\"gh weekend gap\"><div class=\"d-name\">Sun<\u002Fdiv><div class=\"d-num\">24<\u002Fdiv><div class=\"d-cov\">empty<\u002Fdiv><\u002Fdiv>\n\n                <!-- Aisha -->\n                <div class=\"gname\">\n                  <div class=\"ava\" style=\"background:#efe7d0;color:#6c5418;\">AR<\u002Fdiv>\n                  <div class=\"info\"><div class=\"n\">Aisha Rahman<\u002Fdiv><div class=\"r\">Lead Operator · <span class=\"h\">40h this week<\u002Fspan><\u002Fdiv><\u002Fdiv>\n                <\u002Fdiv>\n                <div class=\"gc\"><div class=\"pill early\"><span class=\"code\">Early<\u002Fspan><span class=\"time\">07:00 – 15:00<\u002Fspan><span class=\"pol\">Standard 8-to-5<\u002Fspan><\u002Fdiv><\u002Fdiv>\n                <div class=\"gc\"><div class=\"pill early\"><span class=\"code\">Early<\u002Fspan><span class=\"time\">07:00 – 15:00<\u002Fspan><span class=\"pol\">Standard 8-to-5<\u002Fspan><\u002Fdiv><\u002Fdiv>\n                <div class=\"gc\"><div class=\"pill day\"><span class=\"code\">Day<\u002Fspan><span class=\"time\">08:00 – 17:00<\u002Fspan><span class=\"pol\">Standard 8-to-5<\u002Fspan><\u002Fdiv><\u002Fdiv>\n                <div class=\"gc\"><div class=\"pill day\"><span class=\"code\">Day<\u002Fspan><span class=\"time\">08:00 – 17:00<\u002Fspan><span class=\"pol\">Standard 8-to-5<\u002Fspan><\u002Fdiv><\u002Fdiv>\n                <div class=\"gc\"><div class=\"pill day\"><span class=\"code\">Day<\u002Fspan><span class=\"time\">08:00 – 17:00<\u002Fspan><span class=\"pol\">Standard 8-to-5<\u002Fspan><\u002Fdiv><\u002Fdiv>\n                <div class=\"gc weekend\"><div class=\"pill off\"><span class=\"code\">Off<\u002Fspan><\u002Fdiv><\u002Fdiv>\n                <div class=\"gc weekend\"><div class=\"pill off\"><span class=\"code\">Off<\u002Fspan><\u002Fdiv><\u002Fdiv>\n\n                <!-- Ben -->\n                <div class=\"gname\">\n                  <div class=\"ava\" style=\"background:#dde3eb;color:#33415c;\">BT<\u002Fdiv>\n                  <div class=\"info\"><div class=\"n\">Ben Tan<\u002Fdiv><div class=\"r\">Operator · <span class=\"h\">44h this week<\u002Fspan> · <span style=\"color:var(--bad);font-weight:600;\">conflict<\u002Fspan><\u002Fdiv><\u002Fdiv>\n                <\u002Fdiv>\n                <div class=\"gc\"><div class=\"pill night\"><span class=\"code\">Night<\u002Fspan><span class=\"time\">22:00 – 06:00<\u002Fspan><span class=\"pol\">Shift North<\u002Fspan><span class=\"flag\">!<\u002Fspan><\u002Fdiv><\u002Fdiv>\n                <div class=\"gc empty\"><\u002Fdiv>\n                <div class=\"gc\"><div class=\"pill day\"><span class=\"code\">Day<\u002Fspan><span class=\"time\">08:00 – 17:00<\u002Fspan><span class=\"pol\">Standard 8-to-5<\u002Fspan><\u002Fdiv><\u002Fdiv>\n                <div class=\"gc\"><div class=\"pill day\"><span class=\"code\">Day<\u002Fspan><span class=\"time\">08:00 – 17:00<\u002Fspan><span class=\"pol\">Standard 8-to-5<\u002Fspan><\u002Fdiv><\u002Fdiv>\n                <div class=\"gc\"><div class=\"pill eve\"><span class=\"code\">Evening<\u002Fspan><span class=\"time\">14:00 – 22:00<\u002Fspan><span class=\"pol\">Shift East<\u002Fspan><\u002Fdiv><\u002Fdiv>\n                <div class=\"gc weekend\"><div class=\"pill eve\"><span c an class=\"time\">08:00 – 17:00<\u002Fspan><\u002Fdiv><\u002Fdiv>\n                <div class=\"gc\"><div class=\"pill day\"><span class=\"code\">Day<\u002Fspan><span class=\"time\">08:00 – 17:00<\u002Fspan><\u002Fdiv><\u002Fdiv>\n                <div class=\"gc\"><div class=\"pill day\"><span class=\"code\">Day<\u002Fspan><span class=\"time\">08:00 – 17:00<\u002Fspan><\u002Fdiv><\u002Fdiv>\n                <div class=\"gc weekend empty\"><\u002Fdiv>\n                <div class=\"gc weekend empty\"><\u002Fdiv>\n\n                <!-- Tom -->\n                <div class=\"gname\">\n                  <div class=\"ava\" style=\"background:#e9e3d4;color:#3d362c;\">TB<\u002Fdiv>\n                  <div class=\"info\"><div class=\"n\">Tom Bakker<\u002Fdiv><div class=\"r\">Operator · <span class=\"h\">38h this week<\u002Fspan><\u002Fdiv><\u002Fdiv>\n                <\u002Fdiv>\n                <div class=\"gc\"><div class=\"pill early\"><span class=\"code\">Early<\u002Fspan><span class=\"time\">07:00 – 15:00<\u002Fspan><\u002Fdiv><\u002Fdiv>\n                <div class=\"gc\"><div class=\"pill early\"><span class=\"code\">Early<\u002Fspan><span class=\"time\">07:00 – 15:00<\u002Fspan><\u002Fdiv><\u002Fdiv>\n                <div class=\"gc\"><div class=\"pill early\"><span class=\"code\">Early<\u002Fspan><span class=\"time\">07:00 – 15:00<\u002Fspan><\u002Fdiv><\u002Fdiv>\n                <div class=\"gc\"><div class=\"pill early\"><span class=\"code\">Early<\u002Fspan><span class=\"time\">07:00 – 15:00<\u002Fspan><\u002Fdiv><\u002Fdiv>\n                <div class=\"gc empty\"><\u002Fdiv>\n                <div class=\"gc weekend\"><div class=\"pill day\"><span class=\"code\">Day<\u002Fspan><span class=\"time\">08:00 – 17:00<\u002Fspan><\u002Fdiv><\u002Fdiv>\n                <div class=\"gc weekend empty\"><\u002Fdiv>\n\n                <!-- Karim -->\n                <div class=\"gname\">\n                  <div class=\"ava\" style=\"background:#2c2f3a;color:#f5efe4;\">KY<\u002Fdiv>\n                  <div class=\"info\"><div class=\"n\">Karim Yusof<\u002Fdiv><div class=\"r\">Operator · <span class=\"h\">40h this week<\u002Fspan><\u002Fdiv><\u002Fdiv>\n                <\u002Fdiv>\n                <div class=\"gc\"><div class=\"pill night\"><span class=\"code\">Night<\u002Fspan><span class=\"time\">22:00 – 06:00<\u002Fspan><\u002Fdiv><\u002Fdiv>\n                <div class=\"gc\"><div class=\"pill night\"><span class=\"code\">Night<\u002Fspan><span class=\"time\">22:00 – 06:00<\u002Fspan><\u002Fdiv><\u002Fdiv>\n                <div class=\"gc empty\"><\u002Fdiv>\n                <div class=\"gc\"><div class=\"pill night\"><span class=\"code\">Night<\u002Fspan><span class=\"time\">22:00 – 06:00<\u002Fspan><\u002Fdiv><\u002Fdiv>\n                <div class=\"gc\"><div class=\"pill night\"><span class=\"code\">Night<\u002Fspan><span class=\"time\">22:00 – 06:00<\u002Fspan><\u002Fdiv><\u002Fdiv>\n                <div class=\"gc weekend\"><div class=\"pill night\"><span class=\"code\">Night<\u002Fspan><span class=\"time\">22:00 – 06:00<\u002Fspan><\u002Fdiv><\u002Fdiv>\n                <div class=\"gc weekend empty\"><\u002Fdiv>\n\n                <!-- Add -->\n                <div class=\"gname add\">\n                  <div class=\"ava\">+<\u002Fdiv>\n                  <div class=\"info\"><div class=\"n\">Add someone…<\u002Fdiv><\u002Fdiv>\n                <\u002Fdiv>\n                <div class=\"gc empty\"><\u002Fdiv><div class=\"gc empty\"><\u002Fdiv><div class=\"gc empty\"><\u002Fdiv><div class=\"gc empty\"><\u002Fdiv><div class=\"gc empty\"><\u002Fdiv><div class=\"gc weekend empty\"><\u002Fdiv><div class=\"gc weekend empty\"><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <!-- ─── Bottom action band ────────────────────── -->\n            <div class=\"band\">\n              <div class=\"band-text\">\n                <div class=\"band-h\">Ready when <em>you<\u002Fem> are<span class=\"acc\">.<\u002Fspan><\u002Fdiv>\n                <div class=\"band-sub\">Autosaved 3 min ago · 24 operators · 114 shifts · goes to inboxes and the mobile app<\u002Fdiv>\n              <\u002Fdiv>\n              <div class=\"band-actions\">\n                <span class=\"btn-quiet\">Preview what the team sees<\u002Fspan>\n                <button class=\"btn-send\">Send to the team<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- ─── Annotation pins ─────────────────────────────── -->\n        <div class=\"pin\" style=\"left:260px;top:160px;\">1<\u002Fdiv>\n        <div class=\"pin\" style=\"left:260px;top:308px;\">2<\u002Fdiv>\n        <div class=\"pin\" style=\"left:260px;top:560px;\">3<\u002Fdiv>\n        <div class=\"pin\" style=\"left:1080px;top:560px;\">4<\u002Fdiv>\n        <div class=\"pin\" style=\"left:260px;top:660px;\">5<\u002Fdiv>\n        <div class=\"pin\" style=\"left:1180px;top:1132px;\">6<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ─── Notes rail ───────────────────────────────────────── -->\n    <aside class=\"notes-rail\">\n\n      <div class=\"note-block\">\n        <h3>What <em>changed<\u002Fem>, and why.<\u002Fh3>\n        <div class=\"pull-quote\">\"You can't make something good if you keep adding to it. Subtract.\"<\u002Fdiv>\n        <ul class=\"note-list\">\n          <li><b>① The title is the work.<\u002Fb> \"The <em>Operations<\u002Fem> roster.\" set in a big italic serif. It says what page you're on and what it's about in one breath. No \"Roster Builder\", no \"Build roster assignments\" sub-headline, no card.<\u002Fli>\n          <li><b>② One sentence beats five stats.<\u002Fb> The stat strip (114 shifts / 912h / 2 gaps / 3 conflicts / 2 on leave) was a dashboard masquerading as guidance. Replaced with a single line: <em>\"5 things to sort out before Friday.\"<\u002Fem> followed by a short, plain paragraph that names them. The underlined phrases are clickable.<\u002Fli>\n          <li><b>③ \"Same as last week\" is a one-liner, not a feature.<\u002Fb> The most common roster action — copying last week — gets a hyperlink under the summary, not a button next to ten other buttons.<\u002Fli>\n          <li><b>④ Filter as prose.<\u002Fb> \"Showing <em>7 of 24 operators<\u002Fem> in <em>Site A<\u002Fem>, all roles.\" reads like a sentence. Click any underlined phrase to change it. Pill-chips were chrome pretending to be content.<\u002Fli>\n          <li><b>⑤ Issue panel → inline issue markers.<\u002Fb> The right-rail issues panel was useful but heavy. Issues are now: (a) named in the summary paragraph, (b) flagged with a single red <code>!<\u002Fcode> on the offending cell, (c) noted in the employee's meta-line (\"44h this week · conflict\"). The supervisor sees them <em>where they are<\u002Fem>.<\u002Fli>\n          <li><b>⑥ One destination.<\u002Fb> \"<em>Send to the team.<\u002Fem>\" not \"Publish roster\". The black band at the bottom names the moment (\"Ready when you are.\"), explains what'll happen (\"goes to inboxes and the mobile app\"), and gives you one button. Export and Preview live as quiet text links.<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n\n      <div class=\"note-block\">\n        <h3>What <em>stayed<\u002Fem>, but quieter.<\u002Fh3>\n        <ul class=\"note-list\">\n          <li><b>The grid.<\u002Fb> Still the spine of the page — but cells are flat, borders are hairlines, and the shift pills use a single muted background colour per family instead of a left-bar + tint combo. Type carries the meaning.<\u002Fli>\n          <li><b>Coverage.<\u002Fb> Still per-column, but rendered as a sentence under the day name (\"5 of 6\", \"all in\", \"empty\") rather than a stacked bar. Sunday's \"empty\" is the only word in red — the page tells you where to look without needing a colour key.<\u002Fli>\n          <li><b>Numbers in the employee row.<\u002Fb> \"Aisha · Lead Operator · 40h this week\" — a sentence, comma-separated, not a chip salad.<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n\n      <div class=\"note-block\">\n        <h3>What got <em>cut<\u002Fem>.<\u002Fh3>\n        <ul class=\"note-list\">\n          <li><b>The stat strip.<\u002Fb> Five numbers nobody asked for at the top of every load.<\u002Fli>\n          <li><b>The selection bar.<\u002Fb> Cell-select still works — but the contextual action moves to a small floating chip near the cursor (not shown), not a black band that hijacks the top.<\u002Fli>\n          <li><b>The breadcrumb.<\u002Fb> \"All rosters ←\" link, one word, top-left. Nobody navigates by reading a breadcrumb trail.<\u002Fli>\n          <li><b>\"Apply template\" / \"Copy last week\" buttons.<\u002Fb> Folded into the summary as natural-language links. Both still exist, neither needs a button.<\u002Fli>\n          <li><b>Status pill (Draft).<\u002Fb> Reframed as a sentence: <em>\"Draft. Goes out Friday.\"<\u002Fem> next to the title.<\u002Fli>\n          <li><b>Most icons.<\u002Fb> The only icons left are the brand mark and the small <code>!<\u002Fcode> conflict flag. Words do what icons were doing.<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n\n      <div class=\"note-block\">\n        <h3>The <em>one risk<\u002Fem>.<\u002Fh3>\n        <ul class=\"note-list\">\n          <li>Prose-as-UI is opinionated. It reads beautifully and reduces chrome, but it depends on the page being able to <em>describe itself<\u002Fem> — which means the summary text has to be generated server-side from real data, not faked. The same is true for \"Showing 7 of 24 in Site A\". This is a real engineering ask, but it's also exactly the kind of <em>\"do the hard thing once so the customer doesn't have to do it forever\"<\u002Fem> commitment that distinguishes Basecamp-class software from spreadsheet-class software.<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n\n    <\u002Faside>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n\n<\u002Fbody><\u002Fhtml>"
